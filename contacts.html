<!doctype html>
<html lang="uk">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Контакти — Ферма Старого Світу</title>

  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/header.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />
  <link rel="stylesheet" href="/assets/css/contacts.css" />

  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/include.js"></script>
  <script src="assets/js/mail-send.js"></script>
</head>

<body>
  <div data-include="partials/header.html"></div>

  <main class="contacts-page">
    <section class="contacts-hero">
      <div class="container contacts-grid">
        <div class="contacts-info">
          <h2 class="contacts-title">КОНТАКТИ</h2>
          <div class="contacts-decor" aria-hidden="true"></div>

          <div class="contacts-list">
            <div class="contact-item">
              <img src="/assets/images/location.png" alt="location" class="contact-icon" />
              <div class="contact-text">Україна, Закарпатська обл., с. Угля</div>
            </div>

            <a class="contact-item" href="tel:+380635556677">
              <img src="/assets/images/phone.png" alt="phone" class="contact-icon" />
              <div class="contact-text">+38 068 555 66 77</div>
            </a>

            <a class="contact-item" href="mailto:oldworldfarm@gmail.com">
              <img src="/assets/images/mail.png" alt="mail" class="contact-icon" />
              <div class="contact-text">oldworldfarm@gmail.com</div>
            </a>

            <a class="contact-item" href="https://instagram.com/oldworldfarm" target="_blank" rel="noreferrer noopener">
              <img src="/assets/images/inst.png" alt="instagram" class="contact-icon" />
              <div class="contact-text">@oldworldfarm</div>
            </a>
          </div>
        </div>

        <div class="contacts-image">
          <img src="/assets/images/img1.jpeg" alt="контакти — фото" />
        </div>
      </div>
    </section>

    <section class="contacts-map">
      <img src="/assets/images/map.png" alt="map" />
    </section>

  </main>

  <div data-include="partials/footer.html"></div>
</body>

</html>
